apiVersion: v1
kind: ConfigMap
metadata:
  name: lingtai-api-gateway
  namespace: lingtai-ai
data:
  router.conf: |
    upstream router_app {
        server lingtai-api:8000;
    }

    upstream new_api {
        server lingtai-api-new-api:3000;
    }

    map $http_x_forwarded_proto $router_external_proto {
        default https;
        ""      https;
    }

    server {
        listen 8080;
        server_name api.lingtai.ai;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $router_external_proto;
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User      "";

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        error_page 401 = @sso_login;

        location = /nginx-healthz {
            access_log off;
            return 200 "ok\n";
        }

        location = /_sso_assertion {
            internal;
            proxy_pass http://router_app/sso/assertion;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Router-SSO-Assertion "";
            proxy_set_header New-Api-User "";
        }

        location @sso_login {
            return 302 $router_external_proto://$host/sso/login?return_to=$router_external_proto://$host$request_uri;
        }

        location = /healthz { proxy_pass http://router_app; }
        location ^~ /sso/ { proxy_pass http://router_app; }
        location ^~ /auth/ { proxy_pass http://router_app; }
        location ^~ /cli/ { proxy_pass http://router_app; }
        location ^~ /install { proxy_pass http://router_app; }
        location ^~ /feishu/ { proxy_pass http://router_app; }
        location ^~ /ui/ { proxy_pass http://router_app; }
        location ^~ /portal { proxy_pass http://router_app; }
        location ^~ /me/ { proxy_pass http://router_app; }
        location ^~ /admin/ { proxy_pass http://router_app; }
        location ^~ /bridge/ { proxy_pass http://router_app; }

        location ^~ /v1/ {
            proxy_set_header X-Router-SSO-Assertion "";
            proxy_set_header New-Api-User "";
            proxy_pass http://new_api;
        }

        location = /v1 {
            proxy_set_header X-Router-SSO-Assertion "";
            proxy_set_header New-Api-User "";
            proxy_pass http://new_api;
        }

        location ^~ /mj/ { proxy_pass http://new_api; }
        location ^~ /suno/ { proxy_pass http://new_api; }
        location ^~ /kling/ { proxy_pass http://new_api; }

        location ^~ /api/ {
            auth_request /_sso_assertion;
            auth_request_set $router_sso_assertion $upstream_http_x_router_sso_assertion;
            proxy_set_header X-Router-SSO-Assertion $router_sso_assertion;
            proxy_set_header New-Api-User "";
            proxy_set_header Authorization "";
            proxy_pass http://new_api;
        }

        location / {
            auth_request /_sso_assertion;
            auth_request_set $router_sso_assertion $upstream_http_x_router_sso_assertion;
            proxy_set_header X-Router-SSO-Assertion $router_sso_assertion;
            proxy_set_header New-Api-User "";
            proxy_set_header Authorization "";
            proxy_pass http://new_api;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: lingtai-api-gateway
  namespace: lingtai-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lingtai-api
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lingtai-api-gateway
  namespace: lingtai-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lingtai-api
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lingtai-api
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /nginx-healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /nginx-healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/router.conf
              subPath: router.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: lingtai-api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lingtai-cloudflared
  namespace: lingtai-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lingtai-api
      app.kubernetes.io/component: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lingtai-api
        app.kubernetes.io/component: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.3.0
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - --protocol
            - http2
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lingtai-cloudflared
                  key: TUNNEL_TOKEN
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lingtai-api
  namespace: lingtai-ai
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-lingtai-dns01
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: api.lingtai.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lingtai-api-gateway
                port:
                  number: 8080
  tls:
    - hosts:
        - api.lingtai.ai
      secretName: api-lingtai-ai-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lingtai-casdoor
  namespace: lingtai-ai
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-lingtai-dns01
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: sso.lingtai.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
