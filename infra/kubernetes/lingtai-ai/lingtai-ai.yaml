    app.kubernetes.io/component: router
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lingtai-api
  namespace: lingtai-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lingtai-api
      app.kubernetes.io/component: router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lingtai-api
        app.kubernetes.io/component: router
    spec:
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec", "until nc -z lingtai-router-postgresql 5432; do echo waiting for router postgres; sleep 2; done"]
        - name: run-migrations
          image: enterprise-llm-proxy:orbstack-20260430-1242-codex-openai-bridge
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              export ENTERPRISE_LLM_PROXY_DATABASE_URL="postgresql+psycopg://router:${POSTGRES_PASSWORD}@lingtai-router-postgresql:5432/router"
              exec alembic upgrade head
          envFrom:
            - configMapRef:
                name: lingtai-router-config
            - secretRef:
                name: lingtai-router-app
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lingtai-router-postgres
                  key: password
      containers:
        - name: app
          image: enterprise-llm-proxy:orbstack-20260430-1242-codex-openai-bridge
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              export ENTERPRISE_LLM_PROXY_DATABASE_URL="postgresql+psycopg://router:${POSTGRES_PASSWORD}@lingtai-router-postgresql:5432/router"
              exec uvicorn enterprise_llm_proxy.app:create_app --factory --host 0.0.0.0 --port 8000
          envFrom:
            - configMapRef:
                name: lingtai-router-config
            - secretRef:
                name: lingtai-router-app
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lingtai-router-postgres
                  key: password
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
