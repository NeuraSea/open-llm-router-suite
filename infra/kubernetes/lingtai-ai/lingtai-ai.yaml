apiVersion: apps/v1
kind: Deployment
metadata:
  name: lingtai-api-new-api
  namespace: lingtai-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lingtai-api
      app.kubernetes.io/component: new-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lingtai-api
        app.kubernetes.io/component: new-api
    spec:
      initContainers:
        - name: wait-for-newapi-postgresql
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec", "until nc -z lingtai-newapi-postgresql 5432; do echo waiting for newapi postgres; sleep 2; done"]
      containers:
        - name: new-api
          image: new-api:orbstack-20260430-0055-sso-auto-group
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              export SQL_DSN="postgresql://newapi:${POSTGRES_PASSWORD}@lingtai-newapi-postgresql:5432/newapi"
              exec /new-api
          env:
            - name: PORT
              value: "3000"
            - name: SERVER_ADDRESS
              value: https://api.lingtai.ai
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: lingtai-new-api
                  key: session-secret
            - name: ROUTER_SSO_ENABLED
              value: "true"
            - name: ROUTER_SSO_ISSUER
              value: enterprise-llm-proxy
            - name: ROUTER_SSO_AUDIENCE
              value: new-api
            - name: ROUTER_SSO_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: lingtai-new-api
                  key: router-sso-public-key-pem
            - name: ROUTER_SSO_ENTERPRISE_GROUP
              value: default
            - name: ROUTER_SSO_LOGIN_URL
              value: /sso/login
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lingtai-newapi-postgres
                  key: password
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
