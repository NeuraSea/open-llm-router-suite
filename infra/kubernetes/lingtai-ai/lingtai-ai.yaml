apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cloudflare-lingtai-dns01
spec:
  acme:
    email: ops@lingtai.ai
    privateKeySecretRef:
      name: cloudflare-lingtai-dns01-account-key
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
      - selector:
          dnsZones:
            - lingtai.ai
        dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-lingtai-api-token
              key: api-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lingtai-router-config
  namespace: lingtai-ai
data:
  ENTERPRISE_LLM_PROXY_ROUTER_PUBLIC_BASE_URL: https://api.lingtai.ai/v1
  ENTERPRISE_LLM_PROXY_SESSION_COOKIE_SECURE: "true"
  ENTERPRISE_LLM_PROXY_SESSION_COOKIE_DOMAIN: .lingtai.ai
  ENTERPRISE_LLM_PROXY_SSO_RETURN_TO_ALLOWED_HOSTS: '["api.lingtai.ai"]'
  ENTERPRISE_LLM_PROXY_ROUTERCTL_WHEEL_DIR: /app/dist
  ENTERPRISE_LLM_PROXY_ADMIN_EMAILS: '[]'
  ENTERPRISE_LLM_PROXY_ADMIN_SUBJECTS: '[]'
  ENTERPRISE_LLM_PROXY_FEISHU_H5_SDK_URL: https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.16.js
  ENTERPRISE_LLM_PROXY_OIDC_AUTHORIZE_URL: https://sso.lingtai.ai/login/oauth/authorize
  ENTERPRISE_LLM_PROXY_OIDC_CLIENT_ID: api-lingtai
  ENTERPRISE_LLM_PROXY_OIDC_ISSUER: https://sso.lingtai.ai
  ENTERPRISE_LLM_PROXY_OIDC_JWKS_URL: https://sso.lingtai.ai/.well-known/jwks
  ENTERPRISE_LLM_PROXY_OIDC_LOGIN_LABEL: Lingtai WeChat
  ENTERPRISE_LLM_PROXY_OIDC_REDIRECT_URI: https://api.lingtai.ai/auth/oidc/callback
  ENTERPRISE_LLM_PROXY_OIDC_SCOPE: openid profile email offline_access
  ENTERPRISE_LLM_PROXY_OIDC_TOKEN_URL: https://sso.lingtai.ai/api/login/oauth/access_token
  ENTERPRISE_LLM_PROXY_OIDC_TRUST_ADMIN_CLAIM: "false"
  ENTERPRISE_LLM_PROXY_OIDC_TRUSTED_DELEGATION_SERVICE_USER_IDS: '[]'
  ENTERPRISE_LLM_PROXY_OIDC_USERINFO_URL: https://sso.lingtai.ai/api/userinfo
  ENTERPRISE_LLM_PROXY_ROUTER_SSO_ISSUER: enterprise-llm-proxy
  ENTERPRISE_LLM_PROXY_ROUTER_SSO_AUDIENCE: new-api
  ENTERPRISE_LLM_PROXY_NEWAPI_SYNC_ENABLED: "false"
  ENTERPRISE_LLM_PROXY_NEWAPI_BASE_URL: http://lingtai-api-new-api:3000
  ENTERPRISE_LLM_PROXY_NEWAPI_ADMIN_USER_ID: "1"
  ENTERPRISE_LLM_PROXY_NEWAPI_ENTERPRISE_GROUP: default
  ENTERPRISE_LLM_PROXY_BRIDGE_BASE_URL_FOR_NEWAPI: http://lingtai-api:8000
  ENTERPRISE_LLM_PROXY_LM_STUDIO_ENABLED: "false"
  ENTERPRISE_LLM_PROXY_LM_STUDIO_BASE_URL: http://host.docker.internal:1234/v1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lingtai-casdoor-config
  namespace: lingtai-ai
data:
  appname: casdoor
  httpport: "8000"
  runmode: prod
  copyrequestbody: "true"
  driverName: postgres
  dbName: casdoor
  showSql: "false"
  isCloudIntranet: "false"
  origin: https://sso.lingtai.ai
  originFrontend: https://sso.lingtai.ai
  staticBaseUrl: https://cdn.casbin.org
  isDemoMode: "false"
  forceLanguage: zh
  defaultLanguage: zh
  defaultApplication: api-lingtai
  enableGzip: "true"
  quota: '{"organization": -1, "user": -1, "application": -1, "provider": -1}'
---
apiVersion: v1
kind: Service
metadata:
  name: lingtai-router-postgresql
  namespace: lingtai-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lingtai-api
    app.kubernetes.io/component: router-postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lingtai-router-postgresql
  namespace: lingtai-ai
spec:
  replicas: 1
  serviceName: lingtai-router-postgresql
  selector:
    matchLabels:
      app.kubernetes.io/name: lingtai-api
      app.kubernetes.io/component: router-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lingtai-api
        app.kubernetes.io/component: router-postgresql
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: router
            - name: POSTGRES_USER
              value: router
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lingtai-router-postgres
                  key: password
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["/bin/sh", "-ec", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-ec", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
