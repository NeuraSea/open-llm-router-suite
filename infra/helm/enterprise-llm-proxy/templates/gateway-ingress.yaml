{{- if and .Values.gateway.enabled .Values.gateway.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "enterprise-llm-proxy.fullname" . }}-gateway
  labels:
    {{- include "enterprise-llm-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    {{- if and .Values.gateway.ingress.tls.enabled .Values.gateway.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.gateway.ingress.tls.clusterIssuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingressClassName | quote }}
  rules:
    - host: {{ required "gateway.hostname is required when gateway.ingress.enabled=true" .Values.gateway.hostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "enterprise-llm-proxy.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.service.port }}
  {{- if .Values.gateway.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.gateway.hostname | quote }}
      secretName: {{ required "gateway.ingress.tls.secretName is required when gateway ingress TLS is enabled" .Values.gateway.ingress.tls.secretName | quote }}
  {{- end }}
{{- end }}
