apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-llm-proxy.fullname" . }}
  labels:
    {{- include "enterprise-llm-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "enterprise-llm-proxy.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
