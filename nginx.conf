upstream router_app {
    server app:8000;
}

upstream new_api {
    server new-api:3000;
}

server {
    listen 80;
    server_name router.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name router.example.com;

    ssl_certificate     /etc/nginx/certs/router.crt;
    ssl_certificate_key /etc/nginx/certs/router.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Router-SSO-Assertion "";
    proxy_set_header New-Api-User      "";

    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    resolver 127.0.0.11 valid=30s ipv6=off;

    error_page 401 = @sso_login;

    location = /_sso_assertion {
        internal;
        proxy_pass http://router_app/sso/assertion;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
    }

    location @sso_login {
        return 302 /sso/login?return_to=$scheme://$host$request_uri;
    }

    location ^~ /sso/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://router_app;
    }

    location ^~ /auth/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://router_app;
    }

    location ^~ /cli/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://router_app;
    }

    location ^~ /install {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://router_app;
    }

    location ^~ /feishu/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://router_app;
    }

    location ^~ /ui/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://router_app;
    }

    location ^~ /portal {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://router_app;
    }

    location ^~ /me/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://router_app;
    }

    location ^~ /admin/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://router_app;
    }

    location ^~ /bridge/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://router_app;
    }

    location ^~ /chat/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://librechat:3080/;
    }

    location ^~ /v1/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://new_api;
    }

    location = /v1 {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://new_api;
    }

    location ^~ /mj/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://new_api;
    }

    location ^~ /suno/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://new_api;
    }

    location ^~ /kling/ {
        proxy_set_header X-Router-SSO-Assertion "";
        proxy_set_header New-Api-User "";
        proxy_pass http://new_api;
    }

    location ^~ /api/ {
        auth_request /_sso_assertion;
        auth_request_set $router_sso_assertion $upstream_http_x_router_sso_assertion;
        proxy_set_header X-Router-SSO-Assertion $router_sso_assertion;
        proxy_set_header New-Api-User "";
        proxy_set_header Authorization "";
        proxy_pass http://new_api;
    }

    location / {
        auth_request /_sso_assertion;
        auth_request_set $router_sso_assertion $upstream_http_x_router_sso_assertion;
        proxy_set_header X-Router-SSO-Assertion $router_sso_assertion;
        proxy_set_header New-Api-User "";
        proxy_set_header Authorization "";
        proxy_pass http://new_api;
    }
}
