name: NewAPI Router SSO Verification

on:
  pull_request:
    paths:
      - ".github/workflows/newapi-router-sso.yml"
      - "scripts/verify-newapi-router-sso.sh"
      - "docker-compose.yml"
      - "nginx.conf"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/**"
      - "third_party/new-api/**"
  push:
    paths:
      - ".github/workflows/newapi-router-sso.yml"
      - "scripts/verify-newapi-router-sso.sh"
      - "docker-compose.yml"
      - "nginx.conf"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/**"
      - "third_party/new-api/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: third_party/new-api/go.mod
          cache-dependency-path: third_party/new-api/go.sum

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Run Router SSO verification
        run: bash scripts/verify-newapi-router-sso.sh
