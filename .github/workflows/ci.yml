name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/**"
      - "web/**"
  push:
    paths:
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/**"
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run tests
        run: uv run pytest -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run tests
        working-directory: web
        run: npm test

      - name: Build
        working-directory: web
        run: npm run build

      - name: Verify committed assets
        run: git diff --exit-code -- src/enterprise_llm_proxy/static/ui
